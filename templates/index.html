<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidney Disease Classifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: #eef0ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #eef0ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .upload-area p {
            color: #666;
            margin-bottom: 10px;
        }

        .upload-area span {
            color: #667eea;
            font-weight: bold;
        }

        #fileInput {
            display: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.5);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .preview-container {
            display: none;
            margin: 20px 0;
            text-align: center;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .result-container {
            display: none;
            margin-top: 25px;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .result-normal {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
        }

        .result-tumor {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .result-label {
            font-size: 32px;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
        }

        .result-confidence {
            font-size: 18px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 5px;
        }

        .result-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-msg {
            display: none;
            background: #ffe0e0;
            color: #d63031;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
        }

        .reset-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🫘 Kidney Disease Classifier</h1>
        <p class="subtitle">Upload a CT scan image to detect Normal or Tumor</p>

        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📁</div>
            <p><span>Click to upload</span> or drag & drop</p>
            <p style="font-size: 12px; color: #aaa;">Supported: JPG, PNG, JPEG</p>
        </div>

        <input type="file" id="fileInput" accept="image/*">

        <div class="preview-container" id="previewContainer">
            <img id="previewImage" src="" alt="Preview">
        </div>

        <button class="btn" id="predictBtn" onclick="predict()" disabled>
            🔍 Analyze Image
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: #666;">Analyzing CT scan...</p>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-label" id="resultLabel"></div>
            <div class="result-confidence" id="resultConfidence"></div>
            <button class="reset-btn" onclick="reset()">🔄 Analyze Another Image</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>
    </div>

    <script>
        let selectedFile = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImage').src = e.target.result;
                document.getElementById('previewContainer').style.display = 'block';
                document.getElementById('predictBtn').disabled = false;
                document.getElementById('resultContainer').style.display = 'none';
                document.getElementById('errorMsg').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        async function predict() {
            if (!selectedFile) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('predictBtn').disabled = true;
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                document.getElementById('loading').style.display = 'none';

                if (data.error) {
                    document.getElementById('errorMsg').textContent = data.error;
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('predictBtn').disabled = false;
                    return;
                }

                const resultContainer = document.getElementById('resultContainer');
                resultContainer.className = 'result-container';

                if (data.prediction === 'Normal') {
                    resultContainer.classList.add('result-normal');
                    document.getElementById('resultIcon').textContent = '✅';
                } else {
                    resultContainer.classList.add('result-tumor');
                    document.getElementById('resultIcon').textContent = '⚠️';
                }

                document.getElementById('resultLabel').textContent = data.prediction;
                document.getElementById('resultConfidence').textContent = 
                    `Confidence: ${data.confidence}%`;
                resultContainer.style.display = 'block';

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorMsg').textContent = 'Something went wrong. Please try again.';
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('predictBtn').disabled = false;
            }
        }

        function reset() {
            selectedFile = null;
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('predictBtn').disabled = true;
            document.getElementById('fileInput').value = '';
        }
    </script>
</body>
</html>
