<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kidney Disease Classifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background-color: #f8f9fa; }
      .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
      #result { font-size: 1.5rem; font-weight: bold; }
      .tumor { color: #dc3545; }
      .normal { color: #198754; }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <div class="card p-4">
        <h2 class="text-center mb-4">🫘 Kidney Disease Classifier</h2>
        <p class="text-center text-muted">Upload a kidney CT scan to classify as Normal or Tumor</p>
        
        <div class="mb-3">
          <input class="form-control" type="file" id="imageInput" accept="image/*">
        </div>
        
        <div class="text-center mb-3">
          <img id="preview" src="" alt="" style="max-height:300px; display:none; border-radius:10px;" class="img-fluid">
        </div>
        
        <div class="d-grid gap-2">
          <button class="btn btn-primary btn-lg" onclick="predictImage()">🔍 Predict</button>
        </div>
        
        <div class="text-center mt-4" id="result"></div>
      </div>
    </div>

    <script>
      document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
          const preview = document.getElementById('preview');
          preview.src = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      });

      function predictImage() {
        const input = document.getElementById('imageInput');
        if (!input.files[0]) {
          alert('Please select an image first!');
          return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
          const base64 = e.target.result.split(',')[1];
          
          document.getElementById('result').innerHTML = '⏳ Analyzing...';

          fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: base64 })
          })
          .then(res => res.json())
          .then(data => {
            const prediction = data[0].image;
            const cssClass = prediction === 'Tumor' ? 'tumor' : 'normal';
            const emoji = prediction === 'Tumor' ? '⚠️' : '✅';
            document.getElementById('result').innerHTML = 
              `<span class="${cssClass}">${emoji} Result: ${prediction}</span>`;
          })
          .catch(err => {
            document.getElementById('result').innerHTML = '❌ Error occurred';
          });
        };
        reader.readAsDataURL(input.files[0]);
      }
    </script>
  </body>
</html>
